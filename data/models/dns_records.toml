origin_resource = "zone"

[[link_resources]]
with = "a"
join = { local = "auth", remote = "zone" }
create_relation = { type = "has_a_record" }

[[link_resources]]
with = "aaaa"
join = { local = "auth", remote = "zone" }
create_relation = { type = "has_aaaa_record" }

[[link_resources]]
with = "cname"
join = { local = "auth", remote = "zone" }
create_relation = { type = "has_cname_record" }

[[link_resources]]
with = "txt"
join = { local = "auth", remote = "zone" }
create_relation = { type = "has_txt_record" }

[[link_resources]]
with = "mx"
join = { local = "auth", remote = "zone" }
create_relation = { type = "has_mx_record" }

[[link_resources]]
with = "srv"
join = { local = "auth", remote = "zone" }
create_relation = { type = "has_srv_record" }

[[link_resources]]
with = "ptr"
join = { local = "auth", remote = "zone" }
create_relation = { type = "has_ptr_record" }

[[link_resources]]
with = "caa"
join = { local = "auth", remote = "zone" }
create_relation = { type = "has_caa_record" }

[[link_resources]]
with = "ns"
join = { local = "auth", remote = "zone" }
match_with = [
  { or = [
    { property = "original_name", value = "{{ origin_resource.name }}" },
    { property = "name", value = "@" },
    { property = "name", empty = true }
  ]}
]
create_relation = { type = "has_apex_ns_record" }

[[link_resources]]
with = "ns"
join = { local = "auth", remote = "zone" }
match_with = [
  { property = "original_name", not = "{{ origin_resource.name }}" },
  { property = "original_name", not = "@" },
  { property = "name", empty = false }
]
create_relation = { type = "has_subdomain_ns_record" }

[[link_resources]]
with = "sshfp"
join = { local = "auth", remote = "zone" }
create_relation = { type = "has_sshfp_record" }

