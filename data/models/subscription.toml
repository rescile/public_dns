# Sets a subscription object as central root.
# Specify the source type
origin_resource = "operator"

# Command line paramter
solution = "{{- scope | default(value='hybridDNS') -}}"
stage = "{{- lifecycle | default(value='DEV') -}}"
resident = "{{- tenant | default(value='test') -}}"

[[create_resource]]
resource_type = "subscription"
name = " {{- solution | lower -}}_{{- resident | lower -}}_{{- stage | lower -}}"
[create_resource.properties]
function = "dns"
operator = "{{- origin_resource.name | lower -}}"
tenant = "{{- resident | lower -}}"
description = "This subscription defines the cloud environment for the resident rescile and captures the dependencies for the solution deployment."
#cost_center = "{{- solutions[solution].cost_center -}}"
stage = "{{- stage | lower -}}"
#availability_zone = "{{- solutions[solution].availability_zone -}}"
created = "{{- now(utc=true) | date(format='%Y-%m-%dT%H:%M:%SZ') -}}"
