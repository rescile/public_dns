[module]
name = "hybridDNS"
url = "https://github.com/rescile/public_dns"
version = "0.0.1"
description = "A hybrid authoritative DNS architecture combining globally distributed anycast nodes with on-premises authoritative servers under a shared zone authority."
rescile_version = ">=0.1.106"

# dependencies: Optional list of other modules this module depends on.
# These can be local paths (relative to this module) or Git URLs.
[dependencies]
graphviewer = "https://github.com/rescile/graphviewer"
graml-module =  "https://github.com/rescile/graphml-module"
module-simple-editor = "https://github.com/rescile/module-simple-editor"
rescile-graphiql-module = "https://github.com/rescile/rescile-graphiql-module/releases/download/v0.0.3/graphiql-module-offline.zip"

[params.operator]
description = "The organization owning the environment."
default = "rescile"
required = true

[params.scope]
description = "The scope describes the solution footprint."
required = true
default = "hybridDNS"

[params.lifecycle]
description = "The lifecycle stage of the solution."
required = true
default = "DEV"
allowed_values = ["DEV", "TEST", "PROD"]

[params.tenant]
description = "The tenant name identifiers the organization that uses the service."
required = true
default = "clienta"

# auth
[requirements.auth]
properties = ["name", "plan"]
description = "The module expects authoritative DNS zone definitions."

[assets."auth.csv"]
description = "Defines the authoritative DNS zones."
bootstrap = '''
type,name,view,zone_format,disabled,dnssec,plan,multisigner,vanity_name_server
auth,rescile.com,default,FORWARD,False,False,enterprise,False,
auth,10.0.252.145.in-addr.arpa,default,FORWARD,False,False,enterprise,False,
'''
[assets."auth.csv".columns]
type = { type = "string", required = true }
name = { type = "string", required = true }
view = { type = "string" }
zone_format = { type = "string" }
disabled = { type = "boolean" }
dnssec = { type = "boolean" }
plan = { type = "string" }
multisigner = { type = "boolean" }
vanity_name_server = { type = "array_of_string" }

# a
[requirements.a]
properties = ["name", "type", "address", "zone"]

[assets."a.csv"]
description = "A records for the DNS zones."
bootstrap = '''
"type","name","address","ttl","comment","disabled","zone"
"a","www.rescile.com","10.1.4.3","3600","","False","rescile.com"
'''
[assets."a.csv".columns]
type = { type = "string", required = true }
name = { type = "string", required = true }
address = { type = "string", required = true }
ttl = { type = "integer" }
comment = { type = "string" }
disabled = { type = "boolean" }
zone = { type = "string", required = true }

