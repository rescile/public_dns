    "api": "https://api.cloudflare.com/client/v4/accounts/account_id/tunnels",
    "cidr": "10.0.0.0/8",
    "kms": "https://acme-v02.api.letsencrypt.org/directory",
    "clearance": "BAFIN,MARS"
  },
  "akamai": {
    "function": "network",
    "domain": "edge",
    "terms": "https://www.akamai.com/legal/terms-of-service/",
    "services": ["dns", "cdn"],
