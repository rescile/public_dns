format = "object_of_objects"
bootstrap = '''
{
  "rescile": {
    "name": "Rescile",
    "address": "street,postcode,city",
    "commercial_contact": "commercial@operator.com",
    "technical_contact": "technical@operator.com"
  }
}
'''
[inputs."operator.json".fields]
