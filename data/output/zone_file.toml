origin_resource = "zone"

[[output]]
resource_type = "zone_file"
filename = "db.{{ origin_resource.name }}.txt"
mimetype = "text/plain"
name = "zone_file_{{ origin_resource.name }}"
jsonnet = '''
// Define zone variables
local origin = std.extVar("origin_resource");

local domain = origin.name;
local absolute(d) = if std.endsWith(d, ".") then d else d + ".";
local fqdn(d) = 
  if std.endsWith(d, ".") then d 
  else if d == "@" then domain + "."
  else if d == domain then d + "."
  else if std.endsWith(d, "." + domain) then d + "." 
  else d + "." + domain + ".";

local formatRecord(name, ttl, type, value) =
  local safeTtl = if ttl == null || std.toString(ttl) == "" then "3600" else std.toString(ttl);
  std.format("%-30s %-7s IN %-7s %s", [fqdn(name), safeTtl, type, value]);

local a_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "A", r.address) for r in std.get(origin, "has_a_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];
local aaaa_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "AAAA", r.address) for r in std.get(origin, "has_aaaa_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];
local cname_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "CNAME", absolute(r.canonical)) for r in std.get(origin, "has_cname_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];
local txt_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "TXT", r.text) for r in std.get(origin, "has_txt_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];
local mx_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "MX", std.toString(r.priority) + " " + absolute(r.mail_exchanger)) for r in std.get(origin, "has_mx_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];
local srv_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "SRV", std.toString(r.priority) + " " + std.toString(r.weight) + " " + std.toString(r.port) + " " + absolute(r.target)) for r in std.get(origin, "has_srv_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];
local ptr_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "PTR", absolute(r.content)) for r in std.get(origin, "has_ptr_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];
local caa_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "CAA", r.content) for r in std.get(origin, "has_caa_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];
local ns_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "NS", absolute(r.content)) for r in std.get(origin, "has_ns_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];
local sshfp_recs = [formatRecord(std.get(r, "original_name", r.name), std.get(r, "ttl", "3600"), "SSHFP", r.content) for r in std.get(origin, "has_sshfp_record", []) if std.toString(std.get(r, "disabled", false)) != "true"];

local records = a_recs + aaaa_recs + cname_recs + txt_recs + mx_recs + srv_recs + ptr_recs + caa_recs + ns_recs + sshfp_recs;

local vanity_ns = std.get(origin, "vanity_name_server", []);
local generated_ns_recs = if std.length(vanity_ns) > 0 then
  [std.format("@ IN NS %s.", [absolute(ns)]) for ns in vanity_ns]
else
  ["@ IN NS ns3.ixcloud.ch.", "@ IN NS ns4.ixcloud.ch."];

local soa_primary = if std.length(vanity_ns) > 0 then absolute(vanity_ns[0]) else "ns3.ixcloud.ch.";
local soa_record = std.format("@ IN SOA %s hostmaster.%s ( 2026030401 7200 3600 1209600 3600 )", [soa_primary, absolute(domain)]);

std.join("\n", [
  "; Zone file for " + domain,
  "$ORIGIN " + absolute(domain),
  "$TTL 3600",
  soa_record,
] + generated_ns_recs + [
  "",
] + records) + "\n"
'''
