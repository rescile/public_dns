origin_resource = "zone"

regions = {
  FRA = "eu-central-1",
  LON = "eu-west-2",
  ZRH = "eu-central-2",
  MIL = "eu-south-1"
}

[[output]]
resource_type = "zone_file"
filename = "zone.txt"
mimetype = "application/txt"
name = "base/db.example.com.txt"
jsonnet = '''
// Define zone variables
local domain = "example.com";
local ttl = 3600;

// Define records
local records = [
  { name: "@", type: "A", value: "192.0.2.1" },
  { name: "www", type: "CNAME", value: "example.com" },
  { name: "mail", type: "A", value: "192.0.2.2" },
  { name: "api", type: "A", value: "10.0.0.5" },
];

// Helper to format each line for a BIND file
local formatRecord(r) =
    std.format("%-15s %-5d IN %-5s %s", [r.name, ttl, r.type, r.value]);

// Generate the final string
std.join("\n", [
  "; Zone file for " + domain,
  "$ORIGIN " + domain + ".",
  "$TTL " + ttl,
  "",
] + std.map(formatRecord, records))
'''
