origin_resource = "zone"

[[output]]
resource_type = "cloudflare_curl"
filename = "cloudflare.sh"
mimetype = "application/txt"
name = "base/cloudflare.sh"
jsonnet = '''
// Define zone variables
local origin = std.extVar("origin_resource");

local zone_id = "zone_id";
local api_token = "api_token";
local domain = origin.name;

// We must define this so the format call has something to reference!
local bind_content = "$ORIGIN " + domain + ".\n@ 3600 IN A 1.1.1.1";

std.format(
  |||
    curl -X POST "https://api.cloudflare.com/client/v4/zones/%s/dns_records/import" \
         -H "Authorization: Bearer %s" \
         -F "file=@<(printf '%s')" \
         -F "proxied=true"
  |||,
  [zone_id, api_token, bind_content]
)
'''
